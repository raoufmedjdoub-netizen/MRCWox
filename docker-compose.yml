version: '3.8'

services:

  # Application Laravel + Nginx + Socket
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpswox_app
    restart: unless-stopped
    ports:
      - "80:80"
      - "9001:9001"
      - "9002:9002"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./docker/ssl:/var/www/html/ssl
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gpswox_network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: gpswox_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gpswox_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: gpswox_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gpswox_network

  # PhpMyAdmin (optionnel, accès admin DB)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gpswox_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
    networks:
      - gpswox_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  gpswox_network:
    driver: bridge
