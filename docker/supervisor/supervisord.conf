[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
stderr_logfile=/var/log/php-fpm.log
stdout_logfile=/var/log/php-fpm.log

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/worker.log
stopwaitsecs=3600

[program:socket]
command=node /var/www/html/socket/socket.js
autostart=true
autorestart=true
user=www-data
stderr_logfile=/var/log/socket.log
stdout_logfile=/var/log/socket.log

[program:tracker-server]
command=java -jar /opt/traccar/tracker-server.jar /opt/traccar/conf/traccar.xml
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/tracker-server.log

[program:insert-run]
command=php /var/www/html/artisan insert:run
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/insert-run.log
